<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clothing Store Demo</title>

  <!-- Google Analytics Measurement Code -->
  <!-- Replace G-XXXXXXXXXX with your own GA4 Measurement ID -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX'); 
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }
    header {
      background-color: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      padding: 20px;
    }
    .product {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 5px;
    }
    button {
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

<header>
  <h1>FashionHub Demo Store</h1>
</header>

<div class="container">
  <div class="product">
    <h2>Classic T‑Shirt</h2>
    <p>Price: ₹499</p>
    <button onclick="trackClick('Classic T-Shirt')">Buy Now</button>
  </div>

  <div class="product">
    <h2>Denim Jeans</h2>
    <p>Price: ₹999</p>
    <button onclick="trackClick('Denim Jeans')">Buy Now</button>
  </div>
</div>

<script>
  function trackClick(itemName) {
    gtag('event', 'purchase_click', {
      event_category: 'engagement',
      event_label: itemName
    });
    alert(itemName + " button click tracked!");
  }
</script>

</body>
</html>
